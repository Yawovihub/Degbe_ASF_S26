<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forms Demo</title>
</head>
<body>

<form action="/admin/users" method="GET">
<!--forms we need to know where info is going and whatr info looks like-->
<!--  form are by default a get request so it send info inside the url -->
<!--  a post request is changed true the method attribute set to Post; it hide the data from the url-->
<!--Only info inside the form will be submitted-->
      <!--inputs= user data Make sure there is a label tag attach to all our inputs-->
  <!--the most basic input inside a Form is a text-->
  <!--the type of the input tells it the index to use and its style-->
  <!--the id is not required inside an input-->
  <!--the name is required-->
  <!--we need button tag to submit data retrieve from user inside the form-->
        <label>First Name:
          <input type="text" name="FirstName" id="LNameid" minlength="1" required>
        </label>
        <br>
        <label>Last Name:
          <input type="text" name="LastName" id="FNameid" minlength="1">
        </label>
        <br>
        <label>Password:
          <input type="password" name=""id="" >
        </label>
        <br>
        <label>Email:
          <input type="email" name=""id="" title="Your email has to be in this format">
        </label>

      <!--  radio button-->
        <br>
        <label>Are u dead or alive??/
          <input type="radio" name="livingStatus" value="Yep" checked > Yep
          <input type="radio" name="livingStatus" value="Nope"> Nope
          <input type="radio" name="livingStatus" value="Idunno"> Idunnno
        </label>



        <button type="submit"> Submit  </button>



</form>










</body>
</html>
