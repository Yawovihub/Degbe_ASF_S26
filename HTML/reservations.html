<!doctype html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reservations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/dd276a9d5b.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css">

</head>
<body class="reservation_body">
    <div>
        <header class="reservation_header">
        <img src="images/logo.png" alt="logo" width="60">
        <nav class="card">
            <ul class="reservation_nav_list">
                <a href="reservations.html" class="nav_list">
                    Reservations
                </a>
                <a href="menu.html" class="nav_list" >
                    Menu
                </a>
                <a href="index.html" class="nav_list" >
                    Home
                </a>
            </ul>
        </nav>
        </header>
    </div>
<p class="reservation_p">
    We take reservations by requests only!
</p>
    <form action="/submit" method="POST">
        <fieldset>
            <legend>Personal infos:</legend>
            <label>
                Name:
                <input type="name" name="name" placeholder="Name" max="20" required>
            </label>
            <label>
                Email:
                <input type="email" name="name" placeholder="Name" max="20" required>
            </label>
            <label>
                Password:
                <input type="password" name="password">
            </label>
        </fieldset>
        <fieldset>
            <legend> Party Infos:</legend>
            <label>
                Party Size:
                <select name="Party_Size">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                </select>
            </label>
            <legend>Date of reservation:</legend>
            <label>
                Date:
                <input type="date" name="Date" placeholder="Date" required>
            </label>
            <legend>Reservation's Time:</legend>
            <label>
                Time:
                <input type="time" name="Time" placeholder="Time" required>
            </label>
            <legend> Seating Preferences:</legend>
            <label for="Indoor">
                <input type="radio" id="html" name="seating_preference" value="Indoor"> Indoor
            </label>
            <label for="Outdoor">
                <input type="radio" id="html" name="seating_preference" value="Outdoor"> Outdoor
            </label>
            <label for="Bar chair">
                <input type="radio" id="html" name="seating_preference" value="Bar chair"> Bar Chairs
            </label>
        </fieldset>
        <label>
            Newsletter:
            <input type="checkbox" name="Newsletter" value="yes"> Opt-In
        </label>
        <fieldset>
            <label>
                Dietary notes:
                <textarea name="DietaryNotes" rows="4" cols="40" maxlength="30" ></textarea>
            </label>
        </fieldset>
        <fieldset>
            <button type="submit">Submit</button>
            <button type="reset">Clear</button>
        </fieldset>
    </form>
</body>
</html>
