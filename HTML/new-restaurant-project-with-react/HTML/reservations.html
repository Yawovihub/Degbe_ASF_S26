<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reservations - Coffee Haven</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://kit.fontawesome.com/dd276a9d5b.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="../CSS/styles.css">
</head>

<body class="reservation_body">
<header>
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <img src="../images/logo.png" alt="logo" width="60">
        Coffee Haven
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
          <li class="nav-item"><a class="nav-link active" href="reservations.html">Reservations</a></li>
        </ul>
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="cart.html">
              <i class="fas fa-shopping-cart"></i> Cart
              <span id="cart-count" class="badge rounded-pill bg-danger">0</span>
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>

<main class="container my-5">
  <div class="text-center mb-4">
    <h1 class="display-5">Book a Table</h1>
    <p class="lead">We take reservations by requests only!</p>
  </div>

  <div class="row justify-content-center">
    <div class="col-md-8">
      <form id="reservationForm" class="bg-light p-4 rounded shadow text-dark">
        <div id="alertContainer"></div>

        <fieldset class="mb-4 p-3 border rounded">
          <legend class="float-none w-auto px-2">Personal Info</legend>
          <div class="row g-3">
            <div class="col-md-6">
              <label for="name" class="form-label">Full Name</label>
              <input type="text" class="form-control" id="name" name="name" maxlength="20" required>
            </div>
            <div class="col-md-6">
              <label for="Email" class="form-label">Email Address</label>
              <input type="email" class="form-control" id="Email" name="Email" required>
            </div>
          </div>
        </fieldset>

        <fieldset class="mb-4 p-3 border rounded">
          <legend class="float-none w-auto px-2">Party & Timing</legend>
          <div class="row g-3">
            <div class="col-md-4">
              <label for="Party_Size" class="form-label">Party Size</label>
              <select id="Party_Size" name="Party_Size" class="form-select" required>
                <option value="" selected disabled>Choose...</option>
                <option value="1">1 Person</option>
                <option value="2">2 People</option>
                <option value="3">3 People</option>
                <option value="4">4 People</option>
                <option value="5">5 People</option>
                <option value="6">6 People</option>
              </select>
            </div>
            <div class="col-md-4">
              <label for="Date" class="form-label">Date</label>
              <input type="date" class="form-control" id="Date" name="Date" required>
            </div>
            <div class="col-md-4">
              <label for="Time" class="form-label">Time</label>
              <input type="time" class="form-control" id="Time" name="Time" required>
            </div>
          </div>
        </fieldset>

        <fieldset class="mb-4 p-3 border rounded">
          <legend class="float-none w-auto px-2">Seating Preference</legend>
          <div class="d-flex gap-3">
            <div class="form-check">
              <input class="form-check-input" type="radio" name="seating_preference" id="indoor" value="Indoor" required>
              <label class="form-check-label" for="indoor">Indoor</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="seating_preference" id="outdoor" value="Outdoor">
              <label class="form-check-label" for="outdoor">Outdoor</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="seating_preference" id="bar" value="Bar chair">
              <label class="form-check-label" for="bar">Bar Chairs</label>
            </div>
          </div>
        </fieldset>

        <div class="mb-3">
          <label for="DietaryNotes" class="form-label">Dietary Notes</label>
          <textarea class="form-control" id="DietaryNotes" name="DietaryNotes" rows="3" placeholder="Allergies, special occasions, etc."></textarea>
        </div>

        <div class="form-check mb-4">
          <input class="form-check-input" type="checkbox" id="Newsletter" name="Newsletter" value="yes">
          <label class="form-check-label" for="Newsletter">
            Sign up for our Newsletter
          </label>
        </div>

        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
          <button type="reset" class="btn btn-secondary me-md-2">Clear Form</button>
          <button type="submit" class="btn btn-primary px-5">Submit Request</button>
        </div>
      </form>

      <div id="reservationResult" class="mt-4 alert alert-info" style="display: none;">
        <h3>Reservation Details</h3>
        <div id="resultContent"></div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../script/script.js"></script>
</body>
</html>
