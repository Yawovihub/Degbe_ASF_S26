<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Menu - Coffee Haven</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://kit.fontawesome.com/dd276a9d5b.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="../CSS/styles.css">
</head>

<body class="menu_body">
<header class="menu_header">
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <img src="../images/logo.png" alt="logo" width="60">
        Coffee Haven
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="menu.html">Menu</a></li>
          <li class="nav-item"><a class="nav-link" href="reservations.html">Reservations</a></li>
        </ul>

        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="cart.html">
              <i class="fas fa-shopping-cart"></i> Cart
              <span id="cart-count" class="badge rounded-pill bg-danger">0</span>
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="container text-center mt-3">
    <p class="menu_p h2">Our Menu</p>
  </div>
</header>

<main class="container">
  <div id="imageContainer" class="text-center my-4">
    <h3 id="imageTitle"></h3>
    <img id="itemImage" src="../images/img5.jpg" alt="Featured Item" class="img-fluid rounded shadow border border-light" style="max-width: 600px;">
  </div>

  <div class="d-flex justify-content-center gap-2 mb-4">
    <a href="cart.html" class="btn btn-secondary">View Cart</a>
    <div class="dropdown">
      <button class="btn btn-secondary dropdown-toggle" type="button" id="dropdownMenuButton" data-bs-toggle="dropdown" aria-expanded="false">
        Select Category
      </button>
      <ul class="dropdown-menu" aria-labelledby="dropdownMenuButton">
        <li><a id="dropdown_item_all" class="dropdown-item" href="#">All</a></li>
        <li><a id="dropdown_item_breakfast" class="dropdown-item" href="#">Breakfast</a></li>
        <li><a id="dropdown_item_lunch" class="dropdown-item" href="#">Lunch</a></li>
        <li><a id="dropdown_item_dinner" class="dropdown-item" href="#">Dinner</a></li>
      </ul>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-dark table-hover menu_table1" id="myTable">
      <caption>Click on an item to see it's image</caption>
      <thead>
      <tr>
        <th scope="col">Id</th>
        <th scope="col">Name</th>
        <th scope="col">Price</th>
        <th scope="col">Calories</th>
        <th scope="col">Description</th>
        <th scope="col">Category</th>
        <th scope="col">Quantity</th>
        <th scope="col">Action</th>
      </tr>
      </thead>
      <tbody id="tableBody">
      </tbody>
    </table>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../script/script.js"></script>
</body>
</html>
